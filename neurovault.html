<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NeuroVault"/>
<meta name="theme-color" content="#080e0a"/>
<title>NeuroVault — Case Registry</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080e0a; --bg2: #0d1a10; --bg3: #0f2018;
    --border: #1a3a22; --border2: #2a5a3a;
    --green: #2adf7a; --green2: #1a9a55; --green3: #4aff9a;
    --text: #d8eed8; --text2: #8ab89a; --text3: #4a7a5a;
    --red: #f08080; --amber: #d0a060; --blue: #60a8d0;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-mono: 'Source Code Pro', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-mono); overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* AUTH SCREEN */
  #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: radial-gradient(ellipse at 50% 0%, #0d2a18 0%, var(--bg) 70%); }
  .auth-logo { font-family: var(--font-display); font-size: 42px; color: var(--green3); letter-spacing: 2px; margin-bottom: 6px; }
  .auth-sub { font-size: 10px; letter-spacing: 4px; color: var(--text3); text-transform: uppercase; margin-bottom: 48px; }
  .auth-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 36px; width: 100%; max-width: 380px; text-align: center; }
  .auth-desc { font-size: 12px; color: var(--text2); line-height: 1.8; margin-bottom: 28px; }
  #google-signin-btn { width: 100%; padding: 14px 20px; background: #fff; color: #333; border: none; border-radius: 8px; font-family: var(--font-mono); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: opacity 0.2s; }
  #google-signin-btn:hover { opacity: 0.92; }
  #google-signin-btn svg { width: 20px; height: 20px; }
  .auth-note { font-size: 10px; color: var(--text3); margin-top: 16px; line-height: 1.6; }

  /* APP */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  
  /* HEADER */
  .header { background: #060c08; border-bottom: 1px solid var(--border); padding: 0 20px; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green2); box-shadow: 0 0 8px var(--green2); }
  .logo-text { font-family: var(--font-display); font-size: 17px; color: var(--green3); letter-spacing: 1px; }
  .logo-badge { font-size: 8px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; display: none; }
  @media(min-width:480px){ .logo-badge { display: block; } }
  .header-actions { display: flex; align-items: center; gap: 8px; }
  .user-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border2); object-fit: cover; cursor: pointer; }
  .btn-new { background: var(--green2); color: #001a08; padding: 7px 14px; border: none; border-radius: 5px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: background 0.2s; }
  .btn-new:hover { background: var(--green3); }

  /* NAV */
  .nav { background: #060c08; border-bottom: 1px solid var(--border); padding: 0 20px; }
  .nav-inner { max-width: 860px; margin: 0 auto; display: flex; gap: 0; }
  .nav-tab { padding: 10px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .nav-tab.active { color: var(--green3); border-bottom-color: var(--green2); }
  .nav-tab:hover { color: var(--text2); }

  /* CONTENT */
  .content { flex: 1; max-width: 860px; margin: 0 auto; width: 100%; padding: 24px 20px; }

  /* DASHBOARD */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
  @media(min-width:600px){ .stats-grid { grid-template-columns: repeat(4, 1fr); } }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px 16px; text-align: center; }
  .stat-num { font-family: var(--font-display); font-size: 40px; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 9px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }

  /* SECTION */
  .section-hd { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* CASE CARDS */
  .case-list { display: flex; flex-direction: column; gap: 8px; }
  .case-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .case-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .case-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .case-diag { font-family: var(--font-display); font-size: 15px; color: var(--text); line-height: 1.3; }
  .case-date { font-size: 10px; color: var(--text3); white-space: nowrap; }
  .case-meta { font-size: 10px; color: var(--text3); margin-bottom: 8px; }
  .tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-size: 9px; letter-spacing: 1px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); color: var(--text2); background: var(--bg); text-transform: uppercase; }
  .tag.pub { border-color: #3a6a1a; color: #90d050; background: #0f1a08; }
  .tag.trauma { border-color: #4a2a0a; color: #d09060; background: #1a0f04; }
  .tag.tumour { border-color: #2a1a4a; color: #9080d0; background: #0a0810; }
  .tag.paediatric { border-color: #3a1a4a; color: #c090e0; background: #100810; }
  .tag.spine { border-color: #0a2a4a; color: #5090d0; background: #04080f; }
  .tag.vascular { border-color: #3a0a0a; color: #d06060; background: #0f0404; }

  /* FORM */
  .form-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
  .form-section-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text); padding: 9px 11px; font-family: var(--font-mono); font-size: 13px;
    outline: none; transition: border 0.2s; resize: vertical;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--green2); }
  .field select option { background: var(--bg2); }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media(max-width:520px) { .grid2, .grid3 { grid-template-columns: 1fr; } }

  /* PUBLISHABLE TOGGLE */
  .pub-toggle { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: #0a1a08; border: 1px solid #1a3a0a; border-radius: 6px; cursor: pointer; }
  .pub-toggle input { width: 16px; height: 16px; accent-color: var(--green2); cursor: pointer; }
  .pub-toggle-label { font-size: 11px; letter-spacing: 1px; color: #90d050; cursor: pointer; }

  /* IMAGES */
  .img-upload-btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; background: var(--bg); border: 1px dashed var(--border2); border-radius: 5px; color: var(--text2); font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: border-color 0.2s; margin-bottom: 12px; }
  .img-upload-btn:hover { border-color: var(--green2); color: var(--green3); }
  .img-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .img-item { border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
  .img-item img { width: 100%; height: 90px; object-fit: cover; display: block; }
  .img-item-label { padding: 4px 6px; background: var(--bg); }
  .img-item-label input { width: 100%; background: transparent; border: none; color: var(--text3); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; outline: none; }
  .img-remove { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.75); border: none; color: var(--red); cursor: pointer; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; display: flex; align-items: center; justify-content: center; }

  /* DETAIL VIEW */
  .detail-header { margin-bottom: 20px; }
  .detail-title { font-family: var(--font-display); font-size: 26px; color: var(--text); margin-bottom: 10px; line-height: 1.3; }
  .detail-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .detail-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; margin-bottom: 12px; }
  .detail-block-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }
  .detail-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .detail-item .dl { font-size: 9px; letter-spacing: 1px; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
  .detail-item .dv { font-size: 13px; color: var(--text); }
  .detail-text { font-size: 13px; color: var(--text2); line-height: 1.8; }

  /* BUTTONS */
  .btn { cursor: pointer; border: none; border-radius: 5px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s; padding: 9px 16px; }
  .btn-primary { background: var(--green2); color: #001a08; font-weight: 600; }
  .btn-primary:hover { background: var(--green3); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }
  .btn-danger { background: #2a0a0a; color: var(--red); border: 1px solid #4a1a1a; }
  .btn-danger:hover { background: #3a1010; }
  .btn-save { padding: 11px 24px; font-size: 12px; }

  /* SEARCH */
  .search-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .search-input { flex: 1; min-width: 160px; background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 9px 12px; font-family: var(--font-mono); font-size: 12px; outline: none; }
  .search-input:focus { border-color: var(--green2); }
  .filter-select { background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; color: var(--text2); padding: 9px 10px; font-family: var(--font-mono); font-size: 11px; outline: none; }

  /* TOAST */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 11px 20px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; z-index: 999; white-space: nowrap; animation: toastIn 0.3s ease; }
  .toast.ok { background: #0d2a18; border: 1px solid var(--green2); color: var(--green3); }
  .toast.err { background: #2a0d0d; border: 1px solid #6a2a2a; color: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* LOADING */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: 12px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green2); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; }
  .empty-title { font-family: var(--font-display); font-size: 22px; color: var(--text3); margin-bottom: 8px; }
  .empty-sub { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 24px; }

  /* SIGNOUT */
  .signout-row { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-top: 1px solid var(--border); margin-top: 20px; }
  .user-info { flex: 1; }
  .user-name { font-size: 12px; color: var(--text2); }
  .user-email { font-size: 10px; color: var(--text3); }

  /* CATEGORY PILLS */
  .cat-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .cat-pill { padding: 5px 12px; border-radius: 20px; font-size: 10px; letter-spacing: 1px; cursor: pointer; border: 1px solid var(--border); color: var(--text3); background: var(--bg2); transition: all 0.2s; text-transform: uppercase; }
  .cat-pill.active { border-color: var(--green2); color: var(--green3); background: #0a2010; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0 16px; }
  .form-actions { display: flex; gap: 10px; align-items: center; padding-top: 8px; }
  .back-btn { display: flex; align-items: center; gap: 6px; font-size: 10px; letter-spacing: 2px; color: var(--text3); cursor: pointer; text-transform: uppercase; margin-bottom: 16px; }
  .back-btn:hover { color: var(--text2); }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">NeuroVault</div>
  <div class="auth-sub">Private Case Registry</div>
  <div class="auth-card">

    <!-- TAB TOGGLE -->
    <div style="display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:24px">
      <div id="tab-signin" onclick="switchTab('signin')" style="flex:1;padding:9px;text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;background:var(--green2);color:#001a08;font-weight:600;transition:all 0.2s">Sign In</div>
      <div id="tab-signup" onclick="switchTab('signup')" style="flex:1;padding:9px;text-align:center;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:var(--text3);transition:all 0.2s">Create Account</div>
    </div>

    <!-- SIGN IN FORM -->
    <div id="form-signin">
      <div class="field"><label>Email</label><input id="si-email" type="email" placeholder="your@email.com" autocomplete="email"/></div>
      <div class="field"><label>Password</label><input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
      <button id="signin-btn" style="width:100%;padding:13px;background:var(--green2);color:#001a08;border:none;border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;margin-bottom:10px;transition:opacity 0.2s" onclick="doSignIn()">Sign In</button>
      <div id="forgot-row" style="text-align:center">
        <span onclick="switchTab('forgot')" style="font-size:10px;color:var(--text3);cursor:pointer;letter-spacing:1px;text-decoration:underline">Forgot password?</span>
      </div>
    </div>

    <!-- SIGN UP FORM -->
    <div id="form-signup" style="display:none">
      <div class="field"><label>Full Name</label><input id="su-name" type="text" placeholder="Dr. Mahmoud..." autocomplete="name"/></div>
      <div class="field"><label>Email</label><input id="su-email" type="email" placeholder="your@email.com" autocomplete="email"/></div>
      <div class="field"><label>Password (min 6 characters)</label><input id="su-pass" type="password" placeholder="••••••••" autocomplete="new-password"/></div>
      <button style="width:100%;padding:13px;background:var(--green2);color:#001a08;border:none;border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:opacity 0.2s" onclick="doSignUp()">Create Account</button>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="form-forgot" style="display:none">
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.7">Enter your email and we'll send you a password reset link.</div>
      <div class="field"><label>Email</label><input id="fp-email" type="email" placeholder="your@email.com"/></div>
      <button style="width:100%;padding:13px;background:var(--green2);color:#001a08;border:none;border-radius:6px;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;margin-bottom:10px" onclick="doReset()">Send Reset Link</button>
      <div style="text-align:center"><span onclick="switchTab('signin')" style="font-size:10px;color:var(--text3);cursor:pointer;letter-spacing:1px;text-decoration:underline">← Back to Sign In</span></div>
    </div>

    <div id="auth-msg" style="margin-top:14px;font-size:11px;text-align:center;line-height:1.6;min-height:18px"></div>
    <div class="auth-note" style="margin-top:16px">Your data is encrypted and private.<br/>Only you can access your cases.</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">NeuroVault</span>
        <span class="logo-badge">Case Registry</span>
      </div>
      <div class="header-actions">
        <button class="btn-new" onclick="showView('form')">+ New Case</button>
        <img id="user-avatar" class="user-avatar" src="" alt="" onclick="showView('account')" title="Account"/>
      </div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-inner">
      <div class="nav-tab active" data-view="dashboard" onclick="navTo('dashboard')">Overview</div>
      <div class="nav-tab" data-view="list" onclick="navTo('list')">Case Log</div>
      <div class="nav-tab" data-view="account" onclick="navTo('account')">Account</div>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>

<div id="toast-el" style="display:none" class="toast"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://jcangkmaypiavwwlxglq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjYW5na21heXBpYXZ3d2x4Z2xxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNTM2OTcsImV4cCI6MjA4OTYyOTY5N30.QnbCF-0BnOfedCCPIbJSHxXDTkMd0WIGVFqzfwlvHR0';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const specialties = ['Neurotrauma','Tumour','Paediatric','Spine','Vascular','Functional','Other'];
const procedures = ['Craniotomy','Craniectomy','Burr hole evacuation','VP Shunt','EVD insertion','ETV','ACDF','Posterior cervical fusion','Lumbar discectomy','Lumbar fusion','Stereotactic biopsy','Skull base surgery','Spinal tumour resection','Other'];
const outcomes = ['Excellent','Good','Fair','Poor','Deceased','Lost to follow-up'];
const resections = ['Gross Total Resection','Near Total Resection','Subtotal Resection','Biopsy only','N/A'];

let currentUser = null;
let cases = [];
let currentView = 'dashboard';
let editingId = null;
let formImages = [];
let filterCat = 'All';
let searchQ = '';
let filterPub = false;

// ---- AUTH UI ----
window.switchTab = (tab) => {
  ['signin','signup','forgot'].forEach(t => {
    document.getElementById('form-'+t).style.display = t === tab ? 'block' : 'none';
  });
  document.getElementById('tab-signin').style.background = tab === 'signin' ? 'var(--green2)' : 'transparent';
  document.getElementById('tab-signin').style.color = tab === 'signin' ? '#001a08' : 'var(--text3)';
  document.getElementById('tab-signup').style.background = tab === 'signup' ? 'var(--green2)' : 'transparent';
  document.getElementById('tab-signup').style.color = tab === 'signup' ? '#001a08' : 'var(--text3)';
  document.getElementById('auth-msg').textContent = '';
};

function setAuthMsg(msg, isErr) {
  const el = document.getElementById('auth-msg');
  el.textContent = msg;
  el.style.color = isErr ? 'var(--red)' : 'var(--green3)';
}

window.doSignIn = async () => {
  const email = document.getElementById('si-email').value.trim();
  const pass = document.getElementById('si-pass').value;
  if (!email || !pass) { setAuthMsg('Please enter email and password', true); return; }
  const btn = document.getElementById('signin-btn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'Sign In'; btn.disabled = false;
  if (error) setAuthMsg(error.message, true);
};

window.doSignUp = async () => {
  const name = document.getElementById('su-name').value.trim();
  const email = document.getElementById('su-email').value.trim();
  const pass = document.getElementById('su-pass').value;
  if (!email || !pass) { setAuthMsg('Please fill all fields', true); return; }
  if (pass.length < 6) { setAuthMsg('Password must be at least 6 characters', true); return; }
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name } }
  });
  if (error) setAuthMsg(error.message, true);
  else setAuthMsg('Account created! Check your email to confirm, then sign in.', false);
};

window.doReset = async () => {
  const email = document.getElementById('fp-email').value.trim();
  if (!email) { setAuthMsg('Please enter your email', true); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) setAuthMsg(error.message, true);
  else setAuthMsg('Reset link sent — check your email', false);
};

// Allow Enter key on password field
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const active = document.activeElement?.id;
    if (active === 'si-pass' || active === 'si-email') doSignIn();
    else if (active === 'su-pass' || active === 'su-email' || active === 'su-name') doSignUp();
  }
});

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('app').style.flexDirection = 'column';
    const avatar = document.getElementById('user-avatar');
    avatar.src = currentUser.user_metadata?.avatar_url || '';
    avatar.style.display = currentUser.user_metadata?.avatar_url ? 'block' : 'none';
    await ensureTable();
    await loadCases();
    renderView('dashboard');
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ---- DB SETUP ----
async function ensureTable() {
  // Cases are stored in a simple JSON column per user
  // We use upsert on a user_data table
}

// ---- DATA ----
async function loadCases() {
  const { data, error } = await sb.from('neurovault_cases')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  if (!error && data) cases = data;
}

async function saveCase(c) {
  const payload = { ...c, user_id: currentUser.id };
  if (c.id && !c.id.includes('-new')) {
    const { error } = await sb.from('neurovault_cases').update(payload).eq('id', c.id).eq('user_id', currentUser.id);
    return !error;
  } else {
    delete payload.id;
    const { data, error } = await sb.from('neurovault_cases').insert(payload).select().single();
    if (!error && data) { cases.unshift(data); return true; }
    return false;
  }
}

async function deleteCase(id) {
  const { error } = await sb.from('neurovault_cases').delete().eq('id', id).eq('user_id', currentUser.id);
  if (!error) cases = cases.filter(c => c.id !== id);
  return !error;
}

// ---- VIEWS ----
window.navTo = (v) => {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  renderView(v);
};
window.showView = (v) => { editingId = null; formImages = []; renderView(v); };

function renderView(v) {
  currentView = v;
  const el = document.getElementById('main-content');
  if (v === 'dashboard') el.innerHTML = renderDashboard();
  else if (v === 'list') el.innerHTML = renderList();
  else if (v === 'form') el.innerHTML = renderForm();
  else if (v === 'detail') el.innerHTML = renderDetail();
  else if (v === 'account') el.innerHTML = renderAccount();
  bindEvents(v);
}

// ---- DASHBOARD ----
function renderDashboard() {
  const total = cases.length;
  const pub = cases.filter(c => c.publishable).length;
  const now = new Date();
  const thisMonth = cases.filter(c => { const d = new Date(c.surgery_date || c.created_at); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); }).length;
  const withImg = cases.filter(c => c.images?.length > 0).length;
  const byCat = specialties.map(s => ({ s, n: cases.filter(c => c.category === s).length })).filter(x => x.n > 0);
  const pubCases = cases.filter(c => c.publishable).slice(0, 5);

  return `
  <div class="section-hd" style="margin-bottom:16px">Welcome back, ${currentUser.user_metadata?.full_name?.split(' ')[0] || 'Doctor'}</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" style="color:var(--green3)">${total}</div><div class="stat-label">Total Cases</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#90d050">${pub}</div><div class="stat-label">Publishable</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${thisMonth}</div><div class="stat-label">This Month</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${withImg}</div><div class="stat-label">With Images</div></div>
  </div>
  ${byCat.length ? `
  <div class="section-hd" style="margin-bottom:12px">By Category</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px">
    ${byCat.map(({s,n}) => `<div class="stat-card" style="padding:14px 18px;cursor:pointer;min-width:80px" onclick="filterByCategory('${s}')">
      <div class="stat-num" style="font-size:32px;color:var(--green3)">${n}</div>
      <div class="stat-label">${s}</div>
    </div>`).join('')}
  </div>` : ''}
  ${pubCases.length ? `
  <div class="section-hd" style="margin-bottom:12px">★ Publishable Cases</div>
  <div class="case-list">
    ${pubCases.map(c => caseCardHTML(c)).join('')}
  </div>` : ''}
  ${total === 0 ? `<div class="empty"><div class="empty-title">No cases yet</div><div class="empty-sub">Start building your academic record</div><button class="btn btn-primary" onclick="showView('form')">Record First Case</button></div>` : ''}
  `;
}

window.filterByCategory = (cat) => { filterCat = cat; navTo('list'); };

function caseCardHTML(c) {
  const catClass = (c.category || '').toLowerCase();
  return `<div class="case-card" onclick="openCase('${c.id}')">
    <div class="case-card-top">
      <div class="case-diag">${c.diagnosis || 'Untitled'}</div>
      <div class="case-date">${fmtDate(c.surgery_date)}</div>
    </div>
    <div class="case-meta">${c.age ? c.age + 'y' : ''}${c.sex ? ' · ' + c.sex : ''}${c.procedure ? ' · ' + c.procedure : ''}</div>
    <div class="tags">
      ${c.category ? `<span class="tag ${catClass}">${c.category}</span>` : ''}
      ${c.outcome ? `<span class="tag">${c.outcome}</span>` : ''}
      ${c.publishable ? `<span class="tag pub">★ Publishable</span>` : ''}
      ${c.images?.length > 0 ? `<span class="tag">📷 ${c.images.length}</span>` : ''}
      ${c.histology ? `<span class="tag">${c.histology.substring(0,20)}</span>` : ''}
    </div>
  </div>`;
}

// ---- LIST ----
function renderList() {
  const filtered = cases.filter(c => {
    const q = searchQ.toLowerCase();
    const ms = !q || [c.diagnosis,c.histology,c.procedure,c.hospital_number,c.category].some(f => f?.toLowerCase().includes(q));
    const mc = filterCat === 'All' || c.category === filterCat;
    const mp = !filterPub || c.publishable;
    return ms && mc && mp;
  });
  return `
  <div class="search-row">
    <input class="search-input" id="search-inp" placeholder="Search diagnosis, histology, procedure..." value="${searchQ}" oninput="handleSearch(this.value)"/>
    <select class="filter-select" onchange="handleFilterCat(this.value)">
      <option value="All" ${filterCat==='All'?'selected':''}>All Categories</option>
      ${specialties.map(s => `<option value="${s}" ${filterCat===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <label style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3);cursor:pointer;white-space:nowrap">
      <input type="checkbox" ${filterPub?'checked':''} onchange="handleFilterPub(this.checked)" style="accent-color:var(--green2)"/> Publishable
    </label>
  </div>
  <div style="font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:12px">${filtered.length} case${filtered.length!==1?'s':''}</div>
  <div class="case-list">
    ${filtered.length ? filtered.map(c => caseCardHTML(c)).join('') : `<div class="empty"><div class="empty-title">No cases found</div></div>`}
  </div>`;
}

window.handleSearch = (v) => { searchQ = v; document.getElementById('main-content').innerHTML = renderList(); bindEvents('list'); };
window.handleFilterCat = (v) => { filterCat = v; document.getElementById('main-content').innerHTML = renderList(); bindEvents('list'); };
window.handleFilterPub = (v) => { filterPub = v; document.getElementById('main-content').innerHTML = renderList(); bindEvents('list'); };

window.openCase = (id) => {
  const c = cases.find(x => x.id === id);
  if (!c) return;
  window._detailCase = c;
  renderView('detail');
};

window.handleImgUpload = (e) => {
  const files = Array.from(e.target.files);
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      formImages.push({ id: Date.now() + Math.random().toString(36).slice(2), name: file.name, data: ev.target.result, label: '' });
      loaded++;
      if (loaded === files.length) {
        document.getElementById('img-preview').innerHTML = formImages.map(img => `
          <div class="img-item">
            <img src="${img.data}" alt=""/>
            <button class="img-remove" onclick="removeImg('${img.id}')">×</button>
            <div class="img-item-label"><input value="${img.label||''}" placeholder="Label..." onchange="updateImgLabel('${img.id}',this.value)"/></div>
          </div>`).join('');
      }
    };
    reader.readAsDataURL(file);
  });
};

window.removeImg = (id) => {
  formImages = formImages.filter(i => i.id !== id);
  document.getElementById('img-preview').innerHTML = formImages.map(img => `
    <div class="img-item">
      <img src="${img.data}" alt=""/>
      <button class="img-remove" onclick="removeImg('${img.id}')">×</button>
      <div class="img-item-label"><input value="${img.label||''}" placeholder="Label..." onchange="updateImgLabel('${img.id}',this.value)"/></div>
    </div>`).join('');
};

window.updateImgLabel = (id, val) => { const img = formImages.find(i => i.id === id); if (img) img.label = val; };

window.submitForm = async () => {
  const diag = document.getElementById('f-diag').value.trim();
  const date = document.getElementById('f-date').value;
  if (!diag) { showToast('Diagnosis is required', 'err'); return; }
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = 'SAVING...';
  const payload = {
    id: editingId || undefined,
    surgery_date: date || null,
    age: document.getElementById('f-age').value || null,
    sex: document.getElementById('f-sex').value || null,
    hospital_number: document.getElementById('f-hn').value || null,
    category: document.getElementById('f-cat').value || null,
    diagnosis: diag,
    gcs_admission: document.getElementById('f-gcs-in').value || null,
    gcs_discharge: document.getElementById('f-gcs-out').value || null,
    who_grade: document.getElementById('f-who').value || null,
    imaging_findings: document.getElementById('f-imaging').value || null,
    procedure: document.getElementById('f-proc').value || null,
    extent_of_resection: document.getElementById('f-resec').value || null,
    intraop_findings: document.getElementById('f-intraop').value || null,
    complications: document.getElementById('f-comp').value || null,
    histology: document.getElementById('f-histo').value || null,
    ihc: document.getElementById('f-ihc').value || null,
    outcome: document.getElementById('f-outcome').value || null,
    gos_score: document.getElementById('f-gos').value || null,
    followup_duration: document.getElementById('f-fu').value || null,
    adjuvant_tx: document.getElementById('f-adj').value || null,
    notes: document.getElementById('f-notes').value || null,
    publishable: document.getElementById('f-pub').checked,
    images: formImages,
    user_id: currentUser.id
  };

  let ok;
  if (editingId) {
    const { error } = await sb.from('neurovault_cases').update(payload).eq('id', editingId).eq('user_id', currentUser.id);
    ok = !error;
    if (ok) { const idx = cases.findIndex(c => c.id === editingId); if (idx > -1) cases[idx] = { ...cases[idx], ...payload }; }
    if (error) console.error(error);
  } else {
    delete payload.id;
    const { data, error } = await sb.from('neurovault_cases').insert(payload).select().single();
    ok = !error && !!data;
    if (ok) cases.unshift(data);
    if (error) console.error(error);
  }

  if (ok) { showToast(editingId ? 'Case updated' : 'Case saved'); editingId = null; formImages = []; navTo('list'); }
  else { showToast('Error saving — check console', 'err'); statusEl.textContent = ''; }
};

function dItem(label, value) {
  return `<div class="detail-item"><div class="dl">${label}</div><div class="dv">${value || '—'}</div></div>`;
}

window.startEdit = (id) => {
  editingId = id;
  const c = cases.find(x => x.id === id);
  formImages = c?.images ? [...c.images] : [];
  renderView('form');
};

window.confirmDelete = async (id) => {
  if (!confirm('Delete this case? This cannot be undone.')) return;
  const ok = await deleteCase(id);
  if (ok) { showToast('Case deleted', 'err'); navTo('list'); }
  else showToast('Error deleting', 'err');
};

      ${dItem('With Images', cases.filter(c=>c.images?.length>0).length)}
    </div>
    <div style="font-size:10px;color:var(--text3);margin-top:12px;line-height:1.7">
      Your cases are stored securely in the cloud and synced across all your devices.<br/>
      Only you can access your data — it is private to your Google account.
    </div>
  </div>
  <div class="detail-block">
    <div class="detail-block-title">Install as App</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.8;margin-bottom:12px">
      <strong style="color:var(--text)">On iPhone/iPad:</strong> Tap the Share button → "Add to Home Screen"<br/>
      <strong style="color:var(--text)">On Android:</strong> Tap the menu (⋮) → "Add to Home Screen" or "Install App"<br/>
      <strong style="color:var(--text)">On Chrome (laptop):</strong> Click the install icon (⊕) in the address bar
    </div>
  </div>`;
}

window.signOut = async () => {
  await sb.auth.signOut();
  cases = [];
};

// ---- UTILS ----
function fmtDate(d) {
  if (!d) return '—';
  try { const [y,m,day] = d.split('-'); return `${day}/${m}/${y}`; } catch { return d; }
}

function showToast(msg, type = 'ok') {
  const el = document.getElementById('toast-el');
  el.textContent = msg;
  el.className = `toast ${type}`;
  el.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2800);
}

function bindEvents(v) {}

// Check for existing session on load
sb.auth.getSession().then(({ data: { session } }) => {
  if (!session) {
    document.getElementById('auth-screen').style.display = 'flex';
  }
});
</script>
</body>
</html>
